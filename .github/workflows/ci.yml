on:
  push:
    branches: [master]
  pull_request:

name: CI

permissions:
  contents: write

jobs:
  flatpak:
    name: "Flatpak (${{ matrix.variant.arch }})"
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-25.08
      options: --privileged
    strategy:
      matrix:
        variant:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.variant.runner }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: org.ppsspp.PPSSPP-${{ matrix.variant.arch }}.flatpak
          manifest-path: org.ppsspp.PPSSPP.yml
          cache-key: flatpak-builder-${{ matrix.variant.arch }}-${{ github.sha }}
          arch: ${{ matrix.variant.arch }}

      - name: Update bleeding-edge release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: bleeding-edge
          name: "PPSSPP Bleeding Edge"
          prerelease: true
          generate_release_notes: true
          files: org.ppsspp.PPSSPP-${{ matrix.variant.arch }}.flatpak
